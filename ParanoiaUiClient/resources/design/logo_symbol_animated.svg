    </g>
    <g id="motion-jitter-fragments" opacity="0.66">
      <animate attributeName="opacity"
        calcMode="discrete" begin="0s"
        keyTimes="0;0.56;0.57;0.58;0.59;1"
        values="0.66;1;0;1;0.66;0.66"

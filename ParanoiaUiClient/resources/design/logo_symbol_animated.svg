            dur="7.2s" repeatCount="indefinite" additive="replace"/>
        </rect>
        <rect id="memory-shard-d" class="red-dim" x="74" y="197" width="112" height="7">
          <animateTransform attributeName="transform" type="translate"
            calcMode="discrete" begin="0s"
            keyTimes="0;0.65;0.66;0.67;0.68;0.71;1"
            values="0,0;30,-1;-26,1;52,-2;-60,0;22,1;0,0"
            dur="7.2s" repeatCount="indefinite" additive="replace"/>
        </rect>
      </g>
    </g>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
  <title id="title">Paranoia animated symbol logo</title>
  <desc id="desc">Animated symbol-only mark for the private messenger Paranoia with pulse, signal tear, jitter, corruption burst, split, and digital collapse motion hooks.</desc>

  <style><![CDATA[
    .panel { fill: #08070a; }
    .void { fill: #050406; }
    .red-deep { fill: #650710; }
    .red-dark { fill: #8f0b16; }
    .red-main { fill: #c91122; }
    .red-hot { fill: #ff2738; }
    .red-dim { fill: #4a060c; }

  ]]></style>

  <rect id="symbol-only-app-field" class="panel" width="320" height="320" rx="54"/>
  <g id="symbol-only-art" transform="translate(32 32)">
    <g id="symbol-motion-shell">
      <animateTransform attributeName="transform" type="translate"
        calcMode="discrete" begin="0s"
        keyTimes="0;0.67;0.68;0.69;0.70;1"
        values="0,0;3,-1;-4,2;2,0;0,0;0,0"
        dur="7.2s" repeatCount="indefinite" additive="replace"/>

      <g id="symbol-memory-wipe">
        <animate attributeName="opacity"
          calcMode="discrete" begin="0s"
          keyTimes="0;0.65;0.66;0.67;0.68;0.71;0.72;0.73;1"
          values="1;0.9;0.6;0.25;0;0.25;0.6;1;1"
          dur="7.2s" repeatCount="indefinite"/>

    <g id="motion-split-left">
      <animateTransform attributeName="transform" type="translate"
        calcMode="discrete" begin="0s"
        keyTimes="0;0.65;0.66;0.67;0.68;0.71;0.72;0.73;1"
        values="0,0;-10,0;-35,0;-65,0;-90,0;-45,0;-15,0;0,0;0,0"
        dur="7.2s" repeatCount="indefinite" additive="replace"/>
      <path id="symbol-left-upper-facet" class="red-dark" d="M36 86L110 38L128 84L91 113L37 110Z"/>
      <path id="symbol-left-middle-facet" class="red-main" d="M37 110L91 113L121 138L82 181L29 153L56 132Z"/>
      <path id="symbol-left-lower-facet" class="red-deep" d="M29 153L82 181L121 190L99 219Z"/>
    </g>
    <g id="motion-split-right">
      <animateTransform attributeName="transform" type="translate"
        calcMode="discrete" begin="0s"
        keyTimes="0;0.65;0.66;0.67;0.68;0.71;0.72;0.73;1"
        values="0,0;12,0;40,0;75,0;105,0;52,0;18,0;0,0;0,0"
        dur="7.2s" repeatCount="indefinite" additive="replace"/>

            values="0,0;22,1;-31,-1;46,0;-54,2;18,-1;0,0"
            dur="7.2s" repeatCount="indefinite" additive="replace"/>
        </rect>
        <rect id="memory-shard-c" class="red-main" x="54" y="154" width="168" height="8">

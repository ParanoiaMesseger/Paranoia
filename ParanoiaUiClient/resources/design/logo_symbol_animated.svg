        calcMode="discrete" begin="0s"
        keyTimes="0;0.87;0.88;0.89;0.90;1"
        values="1;0;1;0;1;1"
        dur="7.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate"
        calcMode="discrete" begin="0s"
        keyTimes="0;0.87;0.88;0.89;0.90;1"
        values="0,0;9,0;-7,0;3,0;0,0;0,0"
        dur="7.2s" repeatCount="indefinite" additive="replace"/>

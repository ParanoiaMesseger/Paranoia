      <rect id="symbol-jitter-left" class="red-dim" x="12" y="129" width="23" height="7"/>
      <rect id="symbol-jitter-bottom" class="red-dim" x="153" y="220" width="30" height="7"/>
    </g>
    <g id="motion-digital-collapse">
